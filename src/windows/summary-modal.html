<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }

    .modal {
      background: #1a1a1a;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      width: 100%;
      opacity: 0;
      transform: scale(0.95) translateY(8px);
      animation: popIn 0.2s ease-out forwards;
      overflow: hidden;
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #222;
      -webkit-app-region: drag;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .close-btn {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      transition: all 0.15s;
    }

    .close-btn:hover { background: #333; color: #aaa; }

    /* Content */
    .content {
      flex: 1;
      padding: 16px 18px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.6;
      color: #d0d0d0;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #666;
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error { color: #ff6b6b; }

    /* Footer */
    .footer {
      padding: 10px 18px 14px;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .footer-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-copy {
      background: #2a2a2a;
      color: #ccc;
    }
    .btn-copy:hover { background: #333; color: #fff; }
    .btn-copy.copied { background: #1a2a1a; color: #6bff6b; }
  </style>
</head>
<body>
  <div class="modal">
    <div class="header">
      <span class="header-title">Resumo</span>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    <div class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>Resumindo...</span>
      </div>
    </div>
    <div class="footer" id="footer" style="display: none;">
      <button class="footer-btn btn-copy" id="copyBtn">Copiar</button>
    </div>
  </div>

  <script src="./summary-modal.js"></script>
</body>
</html>
